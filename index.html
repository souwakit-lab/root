function simplifyNumber(n) {
  if (n <= 0) return "0";
  let coeff = 1, radicand = n;
  for (let i = 2; i * i <= radicand; i++) {
    while (radicand % (i * i) === 0) { coeff *= i; radicand /= (i * i); }
  }
  if (radicand === 1) return coeff.toString();
  return (coeff === 1 ? "" : coeff) + "√" + radicand;
}

function hasOnlySmallPrimes(n) {
  if (n < 2) return false;
  const smallPrimes = [2, 3, 5, 7, 11];
  for (let p of smallPrimes) {
    while (n % p === 0) n /= p;
  }
  return n === 1;
}

function genType1() { 
  let k = Math.floor(Math.random()*20)+1;

}

function genType2() { 
  let k = Math.floor(Math.random()*5)+1;
  let m = Math.floor(Math.random()*8)+2; 
  ans = (k*k*m).toString(); 
  return (k===1) ? `(\\sqrt{${m}})^2` : `(${k}\\sqrt{${m}})^2`; 
}

// 題型三：完全還原原始代碼邏輯
function genType3() {
  const type = Math.floor(Math.random()*3);
  if (type === 0) {
    let a, b;
    do { a = Math.floor(Math.random()*36)+2; } while (!hasOnlySmallPrimes(a));
    do { b = Math.floor(Math.random()*36)+2; } while (!hasOnlySmallPrimes(b));
    ans = simplifyNumber(a * b);
    return `√(${a}) × √(${b})`;
  } else if (type === 1) {
    const q = Math.floor(Math.random()*9)+2;
    const m = Math.floor(Math.random()*9)+2;
    const p = q * m;
    const k = Math.floor(Math.random()*4)+2;
    ans = simplifyNumber(k * k * m);
    return `${k}√(${p}) × √(\\frac{1}{${q}})`;
  } else {
    const s = Math.floor(Math.random()*3)+2;
    const q = s * s;
    const c = Math.floor(Math.random()*4)+1;
    const k = c * s;
    const p = Math.floor(Math.random()*20)+2;
    ans = simplifyNumber(c * c * p);
    return `${k}√(${p}) × √(\\frac{1}{${q}})`;
  }
}

function genType4() {
  const vars = ["a", "b", "c", "y"].sort(() => Math.random() - 0.5).slice(0, Math.floor(Math.random()*3)+1).sort();
  const coeff = Math.floor(Math.random() * 5) + 1;
  const leftovers = [1, 2, 3, 5, 6, 7, 10]; 
  const m = leftovers[Math.floor(Math.random() * leftovers.length)];
  const originalNum = (coeff * coeff) * m;
  
  let qIn = (originalNum === 1 ? "" : originalNum.toString());
  let out = (coeff === 1 ? "" : coeff.toString());
  let inP = (m === 1 ? "" : m.toString());
  
  vars.forEach(v => {
    let p = Math.floor(Math.random()*6)+2; 
    qIn += v + "^" + p;
    let oP = Math.floor(p/2), iP = p%2;
    if(oP>0) out += (oP===1?v:v+"^"+oP);
    if(iP>0) inP += v;
  });
  
  if (out === "" && inP === "") {
    ans = "1";
    qIn = "1";
  } else {
    ans = out + (inP ? "√"+inP : "");
  }
  return `√(${qIn})`;
}

// 題型五：產出字串與原來題型保持 √() 的結構一致
function genType5() {
  const vars = ["a", "b", "c", "y"];
  const hasVar = Math.random() < 0.5;
  const v = hasVar ? vars[Math.floor(Math.random() * vars.length)] : "";

  const sqFrees = [2, 3, 5, 6, 7, 10, 11, 14, 15, 21, 22].sort(() => Math.random() - 0.5);
  
  const numTerms = Math.random() < 0.5 ? 3 : 4; 
  const isSingleTerm = Math.random() < 0.5; 

  let terms = [];

  function getK(r) {
    let maxK = Math.floor(Math.sqrt(120 / r));
    if (maxK < 1) maxK = 1;
    return Math.floor(Math.random() * maxK) + 1;
  }

  if (isSingleTerm) {
    const r1 = sqFrees[0];
    let sum = 0;
    do {
      terms = [];
      sum = 0;
      for(let i=0; i<numTerms; i++) {
        let k = getK(r1);
        let c = (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
        terms.push({c: c, k: k, r: r1});
        sum += c * k;
      }
    } while (sum === 0);

  } else {
    const r1 = sqFrees[0];
    const r2 = sqFrees[1];
    let sum1 = 0, sum2 = 0;

    do {
      terms = [];
      sum1 = 0;
      for(let i=0; i<2; i++) {
        let k = getK(r1);
        let c = (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
        terms.push({c: c, k: k, r: r1});
        sum1 += c * k;
      }
    } while (sum1 === 0);

    do {
      let termsR2 = [];
      sum2 = 0;
      let numR2 = (numTerms === 4) ? 2 : 1;
      for(let i=0; i<numR2; i++) {
        let k = getK(r2);
        let c = (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
        termsR2.push({c: c, k: k, r: r2});
        sum2 += c * k;
      }
      if (sum2 !== 0) {
        terms = terms.concat(termsR2); 
      }
    } while (sum2 === 0);
  }

  terms.sort(() => Math.random() - 0.5);

  let qStr = "";
  let ansMap = {};

  terms.forEach((t, i) => {
    if (!ansMap[t.r]) ansMap[t.r] = 0;
    ansMap[t.r] += t.c * t.k;

    let sign = t.c > 0 ? "+" : "-";
    let absC = Math.abs(t.c);
    let cStr = absC === 1 ? "" : absC.toString();
    let R = t.k * t.k * t.r;

    if (i === 0) {
      if (t.c < 0) qStr += "-";
      qStr += cStr + "√(" + R + v + ")";
    } else {
      qStr += sign + cStr + "√(" + R + v + ")";
    }
  });

  ans = "";
  Object.keys(ansMap).sort().forEach(r => {
    let coeff = ansMap[r];
    if (coeff !== 0) {
      let cStr = Math.abs(coeff) === 1 ? "" : Math.abs(coeff).toString();
      let sign = coeff > 0 ? "+" : "-";
      ans += sign + cStr + "√" + r + v;
    }
  });

  if (ans.startsWith("+")) ans = ans.substring(1);

  return qStr;
}

// 【最核心的修復】：加入雙層括號 {{$1}} 保證 \frac 等較長字元在 KaTeX 中不會發生 ParseError
function toLatex(raw) {
  if (!raw) return "";
  let s = raw.replace(/√\(([^)]+)\)/g, "\\sqrt{{$1}}")
             .replace(/√([a-z0-9^]+)/g, "\\sqrt{{$1}}")
             .replace(/\^([0-9]+)/g, "^{$1}")
             .replace(/×/g, "\\times ");
  return s;
}

function renderInput() {
  const div = document.getElementById("input-display");
  if (!currentInput) { 
    div.innerHTML = '<span style="color:#ccc; font-size:18px;">請輸入答案...</span>'; 
    return; 
  }
  try {
    katex.render(toLatex(currentInput), div, { throwOnError: false });
  } catch(e) {
    div.textContent = currentInput;
  }
}

function normalizeStr(str) {
  if (!str || str.trim() === "") return "EMPTY_INPUT";
  let s = str.replace(/\s+/g, ""); 
  s = s.replace(/\^1(?!\d)/g, ""); 
  if (!s) return "EMPTY_INPUT";

  if (!s.startsWith("-") && !s.startsWith("+")) s = "+" + s;
  
  let termRegex = /[+-][^+-]+/g;
  let terms = s.match(termRegex);
  if (!terms) return "EMPTY_INPUT";

  let normalizedTerms = terms.map(t => {
    let sign = t[0];
    let body = t.substring(1);
    
    if (body === "0") return "+0"; 

    let parts = body.split("√");
    let out = parts[0] || "";
    let inn = parts[1] || "";

    const process = (p, isOut, hasInn) => {
      if (!p) return "";
      if (/[a-z][0-9]/.test(p)) return "INVALID_FORMAT";
      let n = (p.match(/^\d+/) || [""])[0];
      let v = (p.match(/[a-z](\^\d+)?/g) || []).sort().join("");

      if (n === "1" && (v !== "" || (isOut && hasInn))) n = "";
      return n + v;
    };

    let hasInn = parts.length > 1;
    let normOut = process(out, true, hasInn);
    let normInn = process(inn, false, false);

    if (normOut === "" && !hasInn) normOut = "1";

    return sign + normOut + (hasInn ? "√" + normInn : "");
  });

  if (normalizedTerms.includes("INVALID_FORMAT")) return "INVALID_FORMAT";

  normalizedTerms = normalizedTerms.filter(t => t !== "+0" && t !== "-0");
  if (normalizedTerms.length === 0) return "0";

  normalizedTerms.sort();

  let res = normalizedTerms.join("");
  if (res.startsWith("+")) res = res.substring(1);
  return res;
}

function insert(v) { 
  if(locked || !gameStarted) return; 
  currentInput += v; 
  renderInput(); 
}
function backspace() { 
  if(locked || !gameStarted || currentInput.length === 0) return; 
  currentInput = currentInput.slice(0,-1); 
  renderInput(); 
}
function clearAll() { 
  if(locked || !gameStarted) return; 
  currentInput = ""; 
  renderInput(); 
}

function check() {
  if (locked || !gameStarted) return;
  
  locked = true; 
  const checkBtn = document.getElementById("checkBtn");
  if (checkBtn) {
    checkBtn.disabled = true;
    setTimeout(() => { if (checkBtn) checkBtn.disabled = false; }, 5000);
  }

  totalQ++;
  let userNorm = normalizeStr(currentInput), ansNorm = normalizeStr(ans);
  
  if (userNorm === ansNorm && userNorm !== "EMPTY_INPUT") {
    score = Math.max(0, score + currentMul); 
    correctQ++; 
    streak++;
    const msgDom = document.getElementById("msg");
    msgDom.textContent = "正確！ +" + currentMul;
    
    let gotLuck = false;
    if (streak >= 3 && Math.random() < 0.5) gotLuck = true;
    else if (streak === 2 && Math.random() < 0.1) gotLuck = true;
    
    if (gotLuck && luck < 2) { 
      luck++; 
      setTimeout(() => showMsg("幸運卡 +1！"), 1000); 
    }
    
    setTimeout(() => {
        if(!locked || document.getElementById("nextBtn").style.display === "none") msgDom.textContent = "";
    }, 1500);
    setTimeout(next, 1500);

  } else {
    streak = 0; 
    score = Math.max(0, score - currentMul);
    const msgDom = document.getElementById("msg");
    
    msgDom.innerHTML = '<span>答錯，正解：</span><span id="correct-ans-latex"></span>';
    try {
      katex.render(toLatex(ans), document.getElementById("correct-ans-latex"), { throwOnError: false });
    } catch(e) {
      document.getElementById("correct-ans-latex").textContent = ans.replace(/√([^+-]*)/g, "√($1)");
    }
    
    document.getElementById("nextBtn").style.display = "block";
  }
  currentMul = 1; 
  updateUI();
}

function showMsg(text) {
  const dom = document.getElementById("msg");
  dom.textContent = text;
  if (text.startsWith("正確") || text.includes("幸運卡 +1")) {
    setTimeout(() => { if(!locked || document.getElementById("nextBtn").style.display === "none") dom.textContent = ""; }, 1500);
  }
}

function next() {
  locked = false; 
  currentInput = ""; 
  currentMul = 1;
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("msg").innerHTML = "";
  
  const checkBtn = document.getElementById("checkBtn");
  if (checkBtn) checkBtn.disabled = false;
  
  let qText = (level===1?genType1():level===2?genType2():level===3?genType3():level===4?genType4():genType5());
  try {
    katex.render(toLatex(qText + " = ?"), document.getElementById("q"), { throwOnError: false });
  } catch(e) {
    document.getElementById("q").textContent = qText + " = ?";
  }
  
  renderInput(); 
  updateUI();
}

function updateUI() {
  document.getElementById("score").textContent = score;
  document.getElementById("luck").textContent = luck;
  document.getElementById("correctCount").textContent = correctQ;
  document.getElementById("rate").textContent = totalQ === 0 ? "0%" : Math.round(correctQ/totalQ*100) + "%";
}

function setLevel(n) { 
  if (gameStarted) return;
  level = n; 
  document.querySelectorAll(".level button").forEach((b,i)=>b.classList.toggle("on", i===n-1)); 
  updateStartBtn(); 
}

function updateStartBtn() {
  const c = document.getElementById("className").value.trim();
  const i = document.getElementById("studentId").value.trim();
  const n = document.getElementById("studentName").value.trim();
  document.getElementById("startBtn").disabled = !(c && i && n && level !== null);
}

function updateStudentList() {
  const cname = document.getElementById("className").value;
  const sel = document.getElementById("studentId");
  const nameInput = document.getElementById("studentName");

  sel.innerHTML = '<option value="">請選學號</option>';
  nameInput.value = "";

  if (!cname) {
    sel.disabled = true;
    updateStartBtn();
    return;
  }

  sel.disabled = false;
  const list = studentData[cname] || [];
  list.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.id;
    sel.appendChild(opt);
  });
  updateStartBtn();
}

function autoFillName() {
  const cname = document.getElementById("className").value;
  const sid = document.getElementById("studentId").value;
  const list = studentData[cname] || [];
  const stu = list.find(s => s.id === sid);
  document.getElementById("studentName").value = stu ? stu.name : "";
  updateStartBtn();
}

function startGame() { 
  gameStarted = true; 
  document.getElementById("className").disabled = true;
  document.getElementById("studentId").disabled = true;
  document.getElementById("studentName").disabled = true;
  document.getElementById("startBtn").disabled = true;
  
  startTime = Date.now(); 
  timer = setInterval(() => { 
    let s = Math.floor((Date.now()-startTime)/1000); 
    document.getElementById("time").textContent = Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); 
  }, 1000); 
  
  next(); 
}

function useLuck() { 
  if(!gameStarted || locked || luck < 1) return; 
  luck--; 
  currentMul = Math.random()>0.5 ? 2 : 3; 
  document.getElementById("msg").textContent = "幸運卡生效！本題分數 ×" + currentMul; 
  updateUI(); 
}

function getTotalSec() {
  return startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
}

function uploadScore() {
  if (!gameStarted) {
    alert("請先開始答題");
    return;
  }

  const uploadBtn = document.getElementById("uploadBtn");
  uploadBtn.disabled = true;
  let cooldown = 60;
  uploadBtn.textContent = `冷卻 ${cooldown}s`;

  let cdTimer = setInterval(() => {
    cooldown--;
    if (cooldown <= 0) {
      clearInterval(cdTimer);
      uploadBtn.disabled = false;
      uploadBtn.textContent = "上傳";
    } else {
      uploadBtn.textContent = `冷卻 ${cooldown}s`;
    }
  }, 1000);

  const className = document.getElementById("className").value.trim();
  const studentId = document.getElementById("studentId").value.trim();
  const studentName = document.getElementById("studentName").value.trim();
  const rateValue = totalQ === 0 ? "0" : (correctQ / totalQ * 100).toFixed(1);
  const levelValue = level === 1 ? "題型一" : level === 2 ? "題型二" : level === 3 ? "題型三" : level === 4 ? "題型四" : "題型五";

  const GAS_URL = "https://script.google.com/macros/s/AKfycbyHFGxezML6QQsxvYDIR7t9nx28549ZcxukGITGCpSTH0dmJAYnOIcypGZrJKWELSUl/exec";

  const data = {
    action: "saveScore",
    className: className,
    studentId: studentId,
    studentName: studentName,
    score: score,
    correct: correctQ,
    rate: rateValue,
    level: levelValue,
    timeSec: getTotalSec()
  };

  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("上傳成功！\n\n班級：" + className + "\n學號：" + studentId + "\n姓名：" + studentName + "\n分數：" + score + "\n答對題數：" + correctQ + "\n答對率：" + rateValue + "%");
  })
  .catch(() => {
    alert("上傳失敗，請檢查網路");
    clearInterval(cdTimer);
    uploadBtn.disabled = false;
    uploadBtn.textContent = "上傳";
  });
}
</script>
