const squares = [1, 4, 9, 16, 25, 36, 49, 64, 81, 100, 121];

function simplifyNumber(n) {
  if (n <= 0) return "0";
  let coeff = 1;
  let radicand = n;
  for (let i = 2; i * i <= radicand; i++) {
    while (radicand % (i * i) === 0) {
      coeff *= i;
      radicand /= (i * i);
    }
  }
  if (radicand === 1) return coeff.toString();
  return (coeff === 1 ? "" : coeff) + "√" + radicand;
}

function hasOnlySmallPrimes(n) {
  if (n < 2) return false;
  const smallPrimes = [2, 3, 5, 7, 11];
  for (let p of smallPrimes) {
    while (n % p === 0) n /= p;
  }
  return n === 1;
}

function genType1() {
  const k = Math.floor(Math.random() * 20) + 1;
  const n = k * k;
  ans = k.toString();
  return `√(${n})`;
}

function genType2() {   // 程度二：(k√m)^2
  const k = Math.floor(Math.random() * 5) + 1;
  let m;
  do { m = Math.floor(Math.random() * 36) + 2; } while (!hasOnlySmallPrimes(m));
  ans = (k * k * m).toString();
  return `(${k}√(${m}))²`;
}

function genType3() {   // 程度三：根式乘法
  let attempts = 0;
  while (attempts < 100) {
    attempts++;
    const r = Math.random();
    let qText, simplified;
    if (r < 0.5) {
      let a, b;
      do { a = Math.floor(Math.random() * 36) + 2; } while (!hasOnlySmallPrimes(a));
      do { b = Math.floor(Math.random() * 36) + 2; } while (!hasOnlySmallPrimes(b));
      qText = `√(${a}) × √(${b})`;
      simplified = simplifyNumber(a * b);
    } else {
      const k = Math.floor(Math.random() * 5) + 2;
      let p, q;
      do { p = Math.floor(Math.random() * 36) + 2; } while (!hasOnlySmallPrimes(p));
      do { q = Math.floor(Math.random() * 36) + 2; } while (!hasOnlySmallPrimes(q));
      qText = `${k}√(${p}) × √(${q})`;
      simplified = simplifyNumber(k * k * p * q);
    }
    if (getRadicand(simplified) <= 100) {
      ans = simplified;
      return qText;
    }
  }
  ans = "6";
  return "√(36)";
}

function genType4() {   // 程度四：根式化簡
  const r = Math.random();
  if (r < 0.4) {
    const sq = squares[Math.floor(Math.random() * squares.length)];
    let extra = 1;
    if (Math.random() < 0.7) {
      const smallPrimes = [2, 3, 5, 7, 11];
      extra = smallPrimes[Math.floor(Math.random() * smallPrimes.length)];
    }
    const n = sq * extra;
    ans = simplifyNumber(n);
    return `√(${n})`;
  } else if (r < 0.7) {
    const mSq = squares[Math.floor(Math.random() * squares.length)];
    const nSq = squares[Math.floor(Math.random() * squares.length)];
    ans = simplifyNumber(mSq * nSq);
    return `√(${mSq})×${nSq}`;
  } else {
    const vars = ["y", "a", "b", "c"];
    const v = vars[Math.floor(Math.random() * vars.length)];
    const kSq = squares[Math.floor(Math.random() * squares.length)];
    const k = Math.sqrt(kSq);
    if (Math.random() < 0.6) {
      ans = `${k}√${v}`;
      return `√(${kSq}${v})`;
    } else {
      const powC = Math.random() < 0.5 ? 3 : 1;
      ans = `4ab${powC === 3 ? "c√c" : "√c"}`;
      return `√(16a²b²c${powC === 3 ? "³" : ""})`;
    }
  }
}

function getRadicand(str) {
  if (!str.includes("√")) return 1;
  return parseInt(str.split("√")[1]) || 1;
}

function genQ() {
  if (level === 1) return genType1();
  if (level === 2) return genType2();
  if (level === 3) return genType3();
  return genType4();
}

function toLatex(text) {
  return text
    .replace(/\)²/g, '}^{2}')      // 先處理平方符號
    .replace(/√\(/g, '\\sqrt{')    // 再處理根號
    .replace(/\)/g, '}')           // 最後處理其餘的 )
    .replace(/×/g, '\\times ');
}

function updateStartBtn() {
  const c = document.getElementById("className").value.trim();
  const i = document.getElementById("studentId").value.trim();
  const n = document.getElementById("studentName").value.trim();
  const btn = document.getElementById("startBtn");
  btn.disabled = !(c && i && n && level !== null);
}

function updateStudentList() {
  const cname = document.getElementById("className").value;
  const sel = document.getElementById("studentId");
  const nameInput = document.getElementById("studentName");

  sel.innerHTML = '<option value="">請選學號</option>';
  nameInput.value = "";

  if (!cname) {
    sel.disabled = true;
    updateStartBtn();
    return;
  }

  sel.disabled = false;
  const list = studentData[cname] || [];
  list.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.id;
    sel.appendChild(opt);
  });
  updateStartBtn();
}

function autoFillName() {
  const cname = document.getElementById("className").value;
  const sid = document.getElementById("studentId").value;
  const list = studentData[cname] || [];
  const stu = list.find(s => s.id === sid);
  document.getElementById("studentName").value = stu ? stu.name : "";
  updateStartBtn();
}

function setLevel(n) {
  if (gameStarted) return;
  level = n;
  document.getElementById("lv1").classList.toggle("on", level === 1);
  document.getElementById("lv2").classList.toggle("on", level === 2);
  document.getElementById("lv3").classList.toggle("on", level === 3);
  document.getElementById("lv4").classList.toggle("on", level === 4);
  updateStartBtn();
}

function startTimer() {
  if (startTime) return;
  startTime = Date.now();
  timer = setInterval(updateTime, 1000);
}

function updateTime() {
  if (!startTime) return;
  const sec = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  document.getElementById("time").textContent = `${m}:${s}`;
}

function getTotalSec() {
  return startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
}

function startGame() {
  gameStarted = true;
  startTimer();
  document.getElementById("className").disabled = true;
  document.getElementById("studentId").disabled = true;
  document.getElementById("studentName").disabled = true;
  document.getElementById("startBtn").disabled = true;
  next();
}

function useLuck() {
  if (!gameStarted || luck < 1 || locked) return;
  luck--;
  currentMul = Math.random() < 0.5 ? 2 : 3;
  showMsg("幸運卡生效！本題 ×" + currentMul);
  next();
  update();
}

function insert(v){ if(locked||!gameStarted) return; document.getElementById("input").value += v; }
function del(){ if(locked||!gameStarted) return; document.getElementById("input").value = ""; }

function next() {
  locked = false;
  document.getElementById("nextBtn").style.display = "none";
  const qText = genQ() + " = ?";
  document.getElementById("q").innerHTML = "";
  try {
    katex.render(toLatex(qText), document.getElementById("q"), {throwOnError: false});
  } catch(e) {
    document.getElementById("q").textContent = qText;
  }
  del();
  update();
}

function showMsg(text) {
  const dom = document.getElementById("msg");
  dom.textContent = text;
  if (text.startsWith("正確")) {
    setTimeout(() => { dom.textContent = ""; }, 1500);
  }
}

function update() {
  document.getElementById("score").textContent = score;
  document.getElementById("luck").textContent = luck;
  document.getElementById("correctCount").textContent = correctQ;
  const rate = totalQ === 0 ? 0 : Math.round(correctQ / totalQ * 100);
  document.getElementById("rate").textContent = rate + "%";
}

function addLuck() {
  if (luck < 2) {
    luck++;
    showMsg("幸運卡 +1！");
  }
}

function check() {
  if(locked||!gameStarted) return;
  const val = document.getElementById("input").value.trim();
  const mul = currentMul;

  totalQ++;

  if (val === ans) {
    correctQ++;
    streak++;
    score = Math.max(0, score + 1 * mul);
    showMsg("正確！ +" + mul);

    if (streak >= 3) addLuck();
    if (correctQ % 15 === 0) addLuck();

    setTimeout(() => { next(); }, 1500);
  } else {
    streak = 0;
    score = Math.max(0, score - 1 * mul);
    showMsg("答錯：" + ans);
    if (Math.random() < 0.1) addLuck();

    locked = true;
    document.getElementById("nextBtn").style.display = "block";
  }

  currentMul = 1;
  update();
}

function uploadScore() {
  if (!gameStarted) {
    alert("請先開始答題");
    return;
  }
  if (Date.now() - lastUpload < 5000) {
    alert("上傳過於頻繁，請稍後再試");
    return;
  }

  const className = document.getElementById("className").value.trim();
  const studentId = document.getElementById("studentId").value.trim();
  const studentName = document.getElementById("studentName").value.trim();
  const scoreValue = score;
  const correctValue = correctQ;
  const rateValue = totalQ === 0 ? "0" : (correctQ / totalQ * 100).toFixed(1);
  const levelValue = level === 1 ? "程度一" : level === 2 ? "程度二" : level === 3 ? "程度三" : "程度四";
  const timeSecValue = getTotalSec();

  const GAS_URL = "https://script.google.com/macros/s/AKfycbyHFGxezML6QQsxvYDIR7t9nx28549ZcxukGITGCpSTH0dmJAYnOIcypGZrJKWELSUl/exec";

  const data = {
    action: "saveScore",
    className: className,
    studentId: studentId,
    studentName: studentName,
    score: scoreValue,
    correct: correctValue,
    rate: rateValue,
    level: levelValue,
    timeSec: timeSecValue
  };

  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("上傳成功！\n\n班級：" + className +
          "\n學號：" + studentId +
          "\n姓名：" + studentName +
          "\n分數：" + scoreValue +
          "\n答對題數：" + correctValue +
          "\n答對率：" + rateValue + "%");
    lastUpload = Date.now();
  })
  .catch(() => {
    alert("上傳失敗，請檢查網路");
  });
}
</script>
</body>
</html>
